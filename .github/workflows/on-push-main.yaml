name: on-push-main

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/on-push-main.yaml'
      - '.github/workflows/on-version-tagged.yaml'
      - 'apis/**'
      - 'examples/**'
      - 'functions/**'
      - 'tests/**'
      - 'upbound.yaml'

permissions:
  packages: write
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  validate:
    uses: unbounded-tech/workflows-crossplane/.github/workflows/validate.yaml@v2.20.0
    with:
      examples: |
        [
          { "example": "examples/emailmarketingstacks/minimal.yaml" },
          { "example": "examples/emailmarketingstacks/standard.yaml" },
          { "example": "examples/emailmarketingstacks/local-colima.yaml" }
        ]
      api_path: apis/emailmarketingstacks
      # EmailMarketingStack composes a `PSQLCluster` (managed by the
      # sibling hops-ops/psql-stack Configuration). The validate job
      # doesn't pull cross-Configuration schemas, so PSQLCluster's
      # OpenAPI schema is missing here. Set to false to allow the
      # validate step to pass on unknown-but-typed cross-stack XR
      # refs. KCL composition tests (the `test` job) cover the
      # rendered shape of every cross-stack ref.
      error_on_missing_schemas: false

  test:
    uses: unbounded-tech/workflows-crossplane/.github/workflows/test.yaml@v2.20.0

  e2e:
    uses: unbounded-tech/workflows-crossplane/.github/workflows/e2e.yaml@v2.20.0

  version-and-tag:
    name: Version and Tag
    needs:
      - validate
      - test
      - e2e
    uses: unbounded-tech/workflow-vnext-tag/.github/workflows/workflow.yaml@v1.21.0
    secrets:
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
    with:
      useDeployKey: true
